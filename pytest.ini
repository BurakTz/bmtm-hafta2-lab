# pytest.ini
[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
markers =
    slow: Yavas calisan testler
    integration: Entegrasyon testleri
    e2e: End-to-end testleri (Playwright gerektirir)
